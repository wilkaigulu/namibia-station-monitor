name: Monthly Station Monitor

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas numpy

      - name: Fetch Namibian stations from NOAA ISD
        run: python monitor/fetch_stations.py

      - name: Compute DQS scores
        run: python monitor/compute_dqs.py

      - name: Commit updated monitor data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitor/data/
          git diff --staged --quiet || git commit -m "monitor: auto-update $(date -u '+%Y-%m-%d')"
          git push